<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🎓 SCORM Player — {{ course_info.original_name or 'Course' }}</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #f8f9fa;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }
    .player-header {
      background: linear-gradient(to right, #007bff, #6610f2);
      color: white;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }
    .player-header h5 {
      margin: 0;
      font-weight: 600;
    }
    iframe {
      border: none;
      width: 100%;
      height: calc(100% - 70px);
      background: white;
    }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: calc(100% - 70px);
      color: #6c757d;
      font-size: 1.2rem;
      font-weight: 500;
    }
    .error {
      background: #fff3f3;
      color: #a00;
      border: 1px solid #f5c2c7;
      padding: 1rem;
      margin: 1rem;
      border-radius: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="player-header">
    <h5>🎧 SCORM Audio Player — {{ course_info.original_name or 'Course' }}</h5>
    <div>
      <span class="badge bg-secondary me-2">Lang: {{ lang|upper }}</span>
      <a href="{{ url_for('library') }}" class="btn btn-light btn-sm">← Back to Library</a>
    </div>
  </div>

  <div id="playerContainer">
    <div id="loadingIndicator" class="loading">
      Loading SCORM course, please wait...
    </div>
  </div>

  <script>
    const courseUrl = "{{ course_url }}";

    // Graceful SCORM LMS API Mock (prevents JS errors in offline/local playback)
    (function() {
      const lmsAPI = {
        LMSInitialize: () => console.log("LMSInitialize() called"),
        LMSFinish: () => console.log("LMSFinish() called"),
        LMSGetValue: key => { console.log("LMSGetValue:", key); return ""; },
        LMSSetValue: (key, value) => console.log("LMSSetValue:", key, value),
        LMSCommit: () => console.log("LMSCommit() called"),
        LMSGetLastError: () => "0",
        LMSGetErrorString: () => "No error",
        LMSGetDiagnostic: () => "No diagnostic",
      };
      window.API = window.API || lmsAPI;
      window.API_1484_11 = window.API_1484_11 || lmsAPI;
      console.log("LMS API mock loaded (local mode)");
    })();

    // Load SCORM course safely into iframe
    function loadCourse() {
      const container = document.getElementById("playerContainer");
      const iframe = document.createElement("iframe");
      iframe.src = courseUrl;
      iframe.allow = "fullscreen";
      iframe.onload = () => {
        document.getElementById("loadingIndicator").style.display = "none";
        console.log("✅ SCORM course loaded:", courseUrl);
      };
      iframe.onerror = () => {
        container.innerHTML = `
          <div class="error">
            ❌ Failed to load the SCORM course.<br>
            Please ensure <strong>${courseUrl}</strong> exists or check the manifest.
          </div>`;
      };
      container.appendChild(iframe);
    }

    window.addEventListener("load", loadCourse);
  </script>
</body>
</html>
